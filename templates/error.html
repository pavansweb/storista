<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error | Storista</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    body {
      background: #0f172a;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      overflow: hidden;
    }
    .bg-blur {
      position: fixed;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      filter: blur(100px);
      z-index: -1;
      opacity: 0.3;
      background: #ef4444;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 28px;
      padding: 4rem;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: #fca5a5;
    }
    p {
      color: #94a3b8;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }
    .btn-back {
      padding: 0.8rem 2rem;
      background: #818cf8;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      transition: all 0.2s;
      display: inline-block;
    }
    .btn-back:hover {
      background: #6366f1;
      transform: translateY(-2px);
      color: white;
    }
  </style>
</head>
<body>
  <div class="bg-blur"></div>
  <div class="glass">
    <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #fca5a5;"></i>
    <h1 class="mt-3">Error</h1>
    <p>{{ error }}</p>
    <a href="/" class="btn-back">Return Home</a>
  </div>
</body>
</html>
